{% extends "layout.html" %}

{% block title %}Reset Password - MedAppoint{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2><i class="fas fa-lock-open"></i> Reset Password</h2>
        <p>Enter your new password below.</p>

        <form action="{{ url_for('reset_password', token=token) }}" method="POST">
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> New Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="New password"
                    required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-check-circle"></i> Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                    placeholder="Confirm password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-save"></i> Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
