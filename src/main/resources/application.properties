# Server configuration
server.port=5000

# DataSource configuration (H2 by default, overridden by SPRING_DATASOURCE_URL env var in production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:medical_appointment;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File upload properties
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom application properties
app.upload-dir=${UPLOAD_DIR:src/main/resources/static/uploads}
app.secret-key=${APP_SECRET_KEY:medical-system-secret-key-2024}
app.razorpay-key-id=${APP_RAZORPAY_KEY_ID:rzp_test_YOUR_KEY_ID}
app.razorpay-key-secret=${APP_RAZORPAY_KEY_SECRET:YOUR_SECRET_KEY}

# ── AI Configuration (Groq) ─────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:llama-3.1-8b-instant}

