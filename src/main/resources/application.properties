# Server configuration
server.port=5000

# DataSource configuration (Supabase PostgreSQL with fallback to H2)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:medical_appointment;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File upload properties
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom application properties
app.upload-dir=src/main/resources/static/uploads
app.secret-key=medical-system-secret-key-2024
app.razorpay-key-id=rzp_test_YOUR_KEY_ID
app.razorpay-key-secret=YOUR_SECRET_KEY

