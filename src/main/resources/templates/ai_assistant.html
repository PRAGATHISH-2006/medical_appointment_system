<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: head('AI Healthcare Hub - Medicalcare', ~{::style})}">
<style>
@import url('/css/dashboard.css');

/* ── Hub wrapper ── */
.ai-hub { max-width: 1060px; margin: 0 auto 4rem; }

/* ── Tab pills ── */
.hub-tabs {
  display: flex;
  gap: 0.6rem;
  margin-bottom: 1.75rem;
  flex-wrap: wrap;
}
.hub-tab {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.65rem 1.25rem;
  border-radius: 2rem;
  font-size: 0.88rem;
  font-weight: 700;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: 'Inter', sans-serif;
  background: white;
  color: #64748b;
  border-color: #e2e8f0;
}
.hub-tab:hover   { border-color: #818cf8; color: #4f46e5; }
.hub-tab.active  { background: linear-gradient(135deg, #4f46e5, #8b5cf6); color: white; border-color: transparent; box-shadow: 0 4px 14px rgba(79,70,229,0.3); }

/* ── Chat card ── */
.chat-card {
  background: white;
  border-radius: 1.25rem;
  border: 1px solid #e2e8f0;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  height: 640px;
  overflow: hidden;
}

/* ── Agent selector bar ── */
.agent-bar {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 1rem 1.25rem;
  background: linear-gradient(135deg, #4f46e5 0%, #8b5cf6 100%);
  flex-shrink: 0;
}

.agent-pill {
  padding: 0.35rem 0.85rem;
  border-radius: 2rem;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid rgba(255,255,255,0.35);
  color: rgba(255,255,255,0.8);
  background: transparent;
  font-family: 'Inter', sans-serif;
}
.agent-pill:hover  { background: rgba(255,255,255,0.15); color: white; }
.agent-pill.active { background: white; color: #4f46e5; border-color: white; }

.gemini-badge {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 0.25rem 0.7rem;
  border-radius: 2rem;
  background: rgba(255,255,255,0.2);
  color: white;
  white-space: nowrap;
}

.gemini-dot {
  width: 0.5rem; height: 0.5rem; border-radius: 50%;
  background: #4ade80;
  animation: blink 1.5s ease-in-out infinite;
}
.gemini-dot.offline { background: #f87171; animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Messages area ── */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.25rem 1.25rem 0.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.875rem;
  background: #fafbff;
  scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 2rem; }

/* ── Bubbles ── */
.msg-row { display: flex; gap: 0.6rem; animation: bubbleIn 0.3s ease both; }
@keyframes bubbleIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.msg-row.user  { flex-direction: row-reverse; }

.msg-avatar {
  width: 2rem; height: 2rem; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 800; flex-shrink: 0; margin-top: 2px;
}
.msg-avatar.ai-av   { background: linear-gradient(135deg, #4f46e5, #8b5cf6); color: white; }
.msg-avatar.user-av { background: linear-gradient(135deg, #0ea5e9, #10b981); color: white; }

.bubble {
  max-width: 72%;
  padding: 0.8rem 1rem;
  border-radius: 1rem;
  font-size: 0.88rem;
  line-height: 1.6;
  word-break: break-word;
}
.msg-row.ai   .bubble {
  background: white;
  border: 1px solid #e2e8f0;
  border-bottom-left-radius: 4px;
  color: #1e293b;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.msg-row.user .bubble {
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: white;
  border-bottom-right-radius: 4px;
  box-shadow: 0 2px 10px rgba(79,70,229,0.3);
}
.bubble p    { margin: 0 0 0.35rem; }
.bubble p:last-child { margin-bottom: 0; }
.bubble ul   { padding-left: 1.2rem; margin: 0.4rem 0; }
.bubble h4, .bubble h5 { color: #4f46e5; margin: 0.6rem 0 0.3rem; font-size: 0.9rem; }
.msg-row.user .bubble h4, .msg-row.user .bubble h5 { color: #a5f3fc; }

/* typing dots */
.typing-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #818cf8; margin: 0 2px; animation: typingBounce 1.2s ease-in-out infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%,80%,100%{transform:scale(0.6)opacity:0.6} 40%{transform:scale(1)opacity:1} }

/* ── Suggestions ── */
.suggestions {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  padding: 0.75rem 1.25rem;
  background: #fafbff;
  flex-shrink: 0;
}
.sug-chip {
  padding: 0.3rem 0.75rem;
  border-radius: 2rem;
  border: 1.5px solid #c7d2fe;
  background: white;
  color: #4f46e5;
  font-size: 0.77rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}
.sug-chip:hover { background: #eef2ff; border-color: #818cf8; transform: translateY(-1px); }

/* ── Input bar ── */
.chat-input-bar {
  display: flex;
  gap: 0.75rem;
  padding: 0.875rem 1.25rem;
  border-top: 1px solid #f1f5f9;
  background: white;
  align-items: flex-end;
  flex-shrink: 0;
}
.chat-textarea {
  flex: 1;
  resize: none;
  border: 2px solid #e2e8f0;
  border-radius: 0.875rem;
  padding: 0.75rem 1rem;
  font-size: 0.88rem;
  font-family: 'Inter', sans-serif;
  color: #1e293b;
  outline: none;
  transition: border-color 0.2s;
  max-height: 100px;
  min-height: 44px;
  line-height: 1.5;
  background: #fafbff;
}
.chat-textarea:focus { border-color: #818cf8; background: white; }
.send-btn {
  width: 2.75rem; height: 2.75rem;
  border-radius: 50%;
  background: linear-gradient(135deg, #4f46e5, #8b5cf6);
  border: none;
  color: white;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s;
  box-shadow: 0 4px 12px rgba(79,70,229,0.35);
  flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 18px rgba(79,70,229,0.45); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── Quick action cards inside chat ── */
.booking-confirm-card {
  background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
  border: 1px solid #bbf7d0;
  border-radius: 0.875rem;
  padding: 0.875rem 1rem;
  margin-top: 0.5rem;
  font-size: 0.83rem;
}
.booking-confirm-card .confirm-title { font-weight: 700; color: #065f46; margin-bottom: 0.5rem; }
.booking-confirm-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  background: #10b981; color: white;
  border: none; border-radius: 0.5rem;
  padding: 0.5rem 1rem; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; transition: background 0.2s; font-family: 'Inter', sans-serif;
  text-decoration: none;
}
.booking-confirm-btn:hover { background: #059669; color: white; }

/* ── Doctor suggestion chips ── */
.doc-suggest-row { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
.doc-suggest-item {
  display: flex; align-items: center; justify-content: space-between;
  background: #f8fafc; border: 1px solid #e2e8f0;
  border-radius: 0.75rem; padding: 0.6rem 0.875rem;
  font-size: 0.82rem;
}
.doc-suggest-item strong { color: #0ea5e9; }
.book-this-btn {
  font-size: 0.75rem; font-weight: 700;
  padding: 0.3rem 0.75rem; border-radius: 2rem;
  background: #0ea5e9; color: white; border: none;
  cursor: pointer; text-decoration: none;
  transition: background 0.2s;
}
.book-this-btn:hover { background: #0284c7; color: white; }

/* ── Reminders tab ── */
.reminder-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1.25rem;
  border-radius: 0.875rem;
  border: 1px solid #e2e8f0;
  background: white;
  margin-bottom: 0.75rem;
  transition: all 0.2s;
  animation: bubbleIn 0.3s ease both;
}
.reminder-item:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.06); transform: translateY(-1px); }
.reminder-icon {
  width: 2.5rem; height: 2.5rem; border-radius: 50%;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  color: white; display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; flex-shrink: 0;
}
.reminder-info { flex: 1; margin: 0 0.875rem; }
.reminder-info strong { display: block; font-size: 0.92rem; color: #1e293b; }
.reminder-info small  { font-size: 0.78rem; color: #64748b; }
.del-reminder-btn {
  padding: 0.3rem 0.75rem;
  border-radius: 0.5rem;
  border: none;
  background: #fee2e2; color: #991b1b;
  font-size: 0.78rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
}
.del-reminder-btn:hover { background: #f43f5e; color: white; }
</style>
</head>
<body class="dash-page">
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<main>
  <div class="dashboard animate-fade">
    <div class="container">
      <div class="ai-hub">

        <!-- Header -->
        <div class="dash-header" style="background:linear-gradient(135deg,#4f46e5 0%,#8b5cf6 60%,#ec4899 100%);margin-bottom:1.75rem;">
          <div class="dash-header-text">
            <h1><i class="fas fa-robot"></i> AI Healthcare Hub</h1>
            <p>Powered by <strong>Groq Llama AI</strong> — Ask health questions, check symptoms, and manage medication reminders.</p>
          </div>
          <div class="dash-header-badge" id="gemini-status-badge" style="background:rgba(255,255,255,0.15);">
            <i class="fas fa-circle-notch fa-spin" style="font-size:0.7rem;"></i> Checking AI...
          </div>
        </div>

        <!-- Tab switcher -->
        <div class="hub-tabs">
          <button class="hub-tab active" id="tab-chat" onclick="switchHub('chat')">
            <i class="fas fa-comments"></i> AI Chat Assistant
          </button>
          <button class="hub-tab" id="tab-reminders" onclick="switchHub('reminders')">
            <i class="fas fa-bell"></i> Medication Reminders
          </button>
        </div>

        <!-- ══════════════ CHAT TAB ══════════════ -->
        <div id="hub-chat">
          <div class="chat-card">

            <!-- Agent selector bar -->
            <div class="agent-bar">
              <button class="agent-pill active" id="pill-symptoms" onclick="selectAgent('symptoms')">
                <i class="fas fa-stethoscope"></i> Symptom Checker
              </button>
              <button class="agent-pill" id="pill-hospital" onclick="selectAgent('hospital')">
                <i class="fas fa-hospital"></i> Hospital Info
              </button>
              <button class="agent-pill" id="pill-scheduler" onclick="selectAgent('scheduler')">
                <i class="fas fa-calendar-alt"></i> Appointment Helper
              </button>
              <div class="gemini-badge">
                <div class="gemini-dot" id="gemini-dot"></div>
                <span id="gemini-label">Groq Llama AI</span>
              </div>
            </div>

            <!-- Messages -->
            <div class="chat-messages" id="chat-messages">
              <!-- Populated by JS -->
            </div>

            <!-- Suggestion chips -->
            <div class="suggestions" id="suggestions"></div>

            <!-- Input -->
            <div class="chat-input-bar">
              <textarea class="chat-textarea" id="chat-input" rows="1"
                        placeholder="Ask me anything about your health..."
                        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
              <button class="send-btn" id="send-btn" onclick="sendChat()" title="Send">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- ══════════════ REMINDERS TAB ══════════════ -->
        <div id="hub-reminders" style="display:none;">
          <div class="dash-grid-3-1">

            <!-- List -->
            <div class="dash-card">
              <div class="dash-card-header">
                <div class="dash-card-title"><i class="fas fa-list-ul icon-violet"></i> Active Medication Alarms</div>
                <button class="btn-xs btn-xs-primary" onclick="loadReminders()"><i class="fas fa-sync-alt"></i> Refresh</button>
              </div>
              <div class="dash-card-body" id="reminders-container">
                <div class="empty-state"><i class="fas fa-circle-notch fa-spin" style="font-size:2rem;color:#818cf8;opacity:1;"></i><p>Loading reminders...</p></div>
              </div>
            </div>

            <!-- Form -->
            <div class="dash-card">
              <div class="dash-card-header">
                <div class="dash-card-title"><i class="fas fa-plus-circle icon-pink"></i> Add Reminder</div>
              </div>
              <div class="dash-card-body">
                <form id="reminderForm" onsubmit="submitReminder(event)">
                  <div style="margin-bottom:1rem;">
                    <label style="font-size:0.78rem;font-weight:700;color:#475569;display:block;margin-bottom:0.4rem;">Medicine Name</label>
                    <input type="text" id="medicine_name" class="form-control" placeholder="e.g. Paracetamol 500mg" required>
                  </div>
                  <div style="margin-bottom:1rem;">
                    <label style="font-size:0.78rem;font-weight:700;color:#475569;display:block;margin-bottom:0.4rem;">Dosage</label>
                    <input type="text" id="dosage_input" class="form-control" placeholder="e.g. 1 Tablet" required>
                  </div>
                  <div style="margin-bottom:1.25rem;">
                    <label style="font-size:0.78rem;font-weight:700;color:#475569;display:block;margin-bottom:0.4rem;">Time of Day</label>
                    <select id="time_of_day" class="form-control" required>
                      <option value="08:00 AM">08:00 AM — Breakfast</option>
                      <option value="02:00 PM">02:00 PM — Lunch</option>
                      <option value="08:00 PM">08:00 PM — Dinner</option>
                      <option value="10:00 PM">10:00 PM — Bedtime</option>
                    </select>
                  </div>
                  <button type="submit" class="auth-submit-btn" style="padding:0.8rem;font-size:0.88rem;">
                    <i class="fas fa-bell"></i> Set Reminder
                  </button>
                </form>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script th:replace="~{layout :: scripts}"></script>
<script>
// ──────────────────────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────────────────────
let currentAgent = 'symptoms';
let isTyping = false;
let geminiEnabled = false;

const AGENTS = {
  symptoms: {
    greeting: '👋 Hi! I\'m your **AI Symptom Checker**, powered by Groq Llama AI.\n\nDescribe how you\'re feeling and I\'ll help identify possible causes, suggest home remedies, and recommend which specialist to see.',
    chips: [
      { label: '🤒 Fever & headache',      text: 'I have fever, headache, and body aches since 2 days' },
      { label: '🫀 Chest pain',             text: 'I feel chest tightness and shortness of breath' },
      { label: '🤧 Cold & sore throat',     text: 'I have runny nose, sore throat and mild cough' },
      { label: '😵 Dizziness & nausea',     text: 'I have dizziness, nausea and stomach pain' },
    ]
  },
  hospital: {
    greeting: '🏥 Welcome to the **Hospital Information Desk**!\n\nI can answer questions about our departments, timings, emergency services, location, billing, and insurance policies.',
    chips: [
      { label: '🕐 OPD Hours',             text: 'What are the OPD timings?' },
      { label: '🚨 Emergency contact',      text: 'What is the emergency helpline number?' },
      { label: '🩺 Available departments', text: 'Which specialization departments do you have?' },
      { label: '📍 Hospital location',     text: 'Where is the hospital located?' },
    ]
  },
  scheduler: {
    greeting: '📅 Hi! I\'m your **Smart Appointment Assistant**.\n\nI can help you figure out when and who to book with. Just tell me your needs, e.g.:\n*"I need to see a cardiologist next week"*',
    chips: [
      { label: '❤️ Cardiology appointment', text: 'I need an appointment with a cardiologist as soon as possible' },
      { label: '🦷 Dental checkup',          text: 'Book a dental checkup for me tomorrow' },
      { label: '🦴 Bone pain consult',       text: 'I have knee pain, who should I see?' },
      { label: '📋 General checkup',         text: 'Schedule a general health checkup for me' },
    ]
  }
};

// ──────────────────────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await checkGeminiStatus();
  selectAgent('symptoms');
});

async function checkGeminiStatus() {
  try {
    const resp = await fetch('/api/ai/status');
    const data = await resp.json();
    geminiEnabled = data.geminiEnabled;

    const dot   = document.getElementById('gemini-dot');
    const label = document.getElementById('gemini-label');
    const badge = document.getElementById('gemini-status-badge');

    if (geminiEnabled) {
      dot.classList.remove('offline');
      label.textContent = 'Groq Llama AI Active';
      badge.innerHTML = '<div style="width:0.5rem;height:0.5rem;border-radius:50%;background:#4ade80;animation:blink 1.5s infinite;flex-shrink:0;"></div> Groq Llama AI Active';
    } else {
      dot.classList.add('offline');
      label.textContent = 'AI (Rule-Based)';
      badge.innerHTML = '<i class="fas fa-robot" style="font-size:0.75rem;"></i> Smart AI Mode';
    }
  } catch(e) {
    console.warn('Could not check Gemini status');
  }
}

// ──────────────────────────────────────────────────────────────────────
// TAB SWITCHING
// ──────────────────────────────────────────────────────────────────────
function switchHub(tab) {
  document.getElementById('hub-chat').style.display      = tab === 'chat'      ? 'block' : 'none';
  document.getElementById('hub-reminders').style.display = tab === 'reminders' ? 'block' : 'none';
  document.querySelectorAll('.hub-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'reminders') loadReminders();
}

// ──────────────────────────────────────────────────────────────────────
// AGENT SELECTION
// ──────────────────────────────────────────────────────────────────────
function selectAgent(agent) {
  currentAgent = agent;
  document.querySelectorAll('.agent-pill').forEach(p => p.classList.remove('active'));
  document.getElementById('pill-' + agent).classList.add('active');

  // Clear and greet
  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML = '';
  addMessage(AGENTS[agent].greeting, 'ai');

  // Chips
  const sugs = document.getElementById('suggestions');
  sugs.innerHTML = AGENTS[agent].chips.map(c =>
    `<span class="sug-chip" onclick="useSuggestion('${c.text.replace(/'/g, "\\'")}')">${c.label}</span>`
  ).join('');
}

// ──────────────────────────────────────────────────────────────────────
// CHAT
// ──────────────────────────────────────────────────────────────────────
function useSuggestion(text) {
  document.getElementById('chat-input').value = text;
  sendChat();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

async function sendChat() {
  if (isTyping) return;
  const inp  = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  inp.style.height = 'auto';
  addMessage(text, 'user');

  // Hide suggestions during conversation
  document.getElementById('suggestions').style.display = 'none';

  const loadId = addTypingIndicator();
  isTyping = true;
  document.getElementById('send-btn').disabled = true;

  try {
    // Use the unified Gemini endpoint for all agents
    const resp = await fetch('/api/ai/gemini-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent: currentAgent, message: text })
    });
    const data = await resp.json();

    removeTypingIndicator(loadId);
    isTyping = false;
    document.getElementById('send-btn').disabled = false;

    if (data.success) {
      addMessage(data.reply, 'ai');

      // If symptoms agent → also show doctor suggestions from rule-based engine
      if (currentAgent === 'symptoms') {
        await appendDoctorSuggestions(text);
      }
    } else {
      addMessage('Sorry, I encountered an error. Please try again.', 'ai');
    }

  } catch(err) {
    removeTypingIndicator(loadId);
    isTyping = false;
    document.getElementById('send-btn').disabled = false;
    addMessage('⚠️ Network error. Please check your connection and try again.', 'ai');
  }
}

// Show doctor suggestions from rule-based symptom checker (always)
async function appendDoctorSuggestions(symptomsText) {
  try {
    const resp = await fetch('/api/ai/symptom-checker', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symptoms: symptomsText })
    });
    const data = await resp.json();
    if (data.success && data.suggestedDoctors && data.suggestedDoctors.length > 0) {
      let html = `<div class="doc-suggest-row">
        <div style="font-size:0.8rem;font-weight:700;color:#0ea5e9;margin-bottom:0.4rem;">
          <i class="fas fa-user-md"></i> Recommended ${data.specialization} Specialists:
        </div>`;
      data.suggestedDoctors.forEach(doc => {
        html += `<div class="doc-suggest-item">
          <div><strong>Dr. ${escHtml(doc.name)}</strong> &nbsp;·&nbsp; <span style="color:#64748b;font-size:0.78rem;">Fee: ₹${escHtml(String(doc.fee))}</span></div>
          <a href="/patient/appointment" class="book-this-btn"><i class="fas fa-calendar-plus"></i> Book</a>
        </div>`;
      });
      html += '</div>';
      addMessageHTML(html, 'ai');
    }
  } catch(e) { /* silent */ }
}

// ──────────────────────────────────────────────────────────────────────
// MESSAGE RENDERING
// ──────────────────────────────────────────────────────────────────────
function addMessage(text, sender) {
  const html = markdownToHTML(text);
  addMessageHTML(html, sender);
}

function addMessageHTML(html, sender) {
  const msgs = document.getElementById('chat-messages');
  const row  = document.createElement('div');
  row.className = `msg-row ${sender}`;

  const avatarHtml = sender === 'ai'
    ? `<div class="msg-avatar ai-av"><i class="fas fa-robot"></i></div>`
    : `<div class="msg-avatar user-av"><i class="fas fa-user"></i></div>`;

  row.innerHTML = `${avatarHtml}<div class="bubble">${html}</div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTypingIndicator() {
  const msgs   = document.getElementById('chat-messages');
  const id     = 'typing-' + Date.now();
  const row    = document.createElement('div');
  row.id       = id;
  row.className= 'msg-row ai';
  row.innerHTML= `<div class="msg-avatar ai-av"><i class="fas fa-robot"></i></div>
    <div class="bubble" style="padding:0.9rem 1.1rem;">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}

function removeTypingIndicator(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// Basic markdown → HTML
function markdownToHTML(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    // Headers
    .replace(/^### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^#### (.+)$/gm, '<h5>$1</h5>')
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Bullets
    .replace(/^[\*\-] (.+)$/gm, '<li>$1</li>')
    // Number lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // Wrap consecutive <li> into <ul>
    .replace(/(<li>.+<\/li>)+/gs, m => `<ul>${m}</ul>`)
    // Line breaks
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    // Wrap in paragraphs
    .replace(/^(?!<[hul])(.+)$/gm, (line) => line ? line : '');
}

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ──────────────────────────────────────────────────────────────────────
// REMINDERS
// ──────────────────────────────────────────────────────────────────────
async function loadReminders() {
  const cont = document.getElementById('reminders-container');
  cont.innerHTML = '<div class="empty-state"><i class="fas fa-circle-notch fa-spin" style="font-size:2rem;color:#818cf8;opacity:1;"></i><p>Loading...</p></div>';

  try {
    const resp = await fetch('/api/ai/prescription-reminders');
    const data = await resp.json();
    cont.innerHTML = '';

    if (data.success && data.reminders.length > 0) {
      data.reminders.forEach(r => {
        const item = document.createElement('div');
        item.className = 'reminder-item';
        item.id = 'rem-' + r.id;
        item.innerHTML = `
          <div class="reminder-icon"><i class="fas fa-pills"></i></div>
          <div class="reminder-info">
            <strong>${escHtml(r.medicine_name)}</strong>
            <small><i class="fas fa-prescription-bottle"></i> ${escHtml(r.dosage)} &nbsp;·&nbsp; <i class="fas fa-clock"></i> ${escHtml(r.time_of_day)}</small>
          </div>
          <button class="del-reminder-btn" onclick="deleteReminder(${r.id})">
            <i class="fas fa-trash-alt"></i> Remove
          </button>`;
        cont.appendChild(item);
      });
    } else {
      cont.innerHTML = `<div class="empty-state">
        <i class="fas fa-bell-slash" style="font-size:2.5rem;color:#818cf8;opacity:0.5;margin-bottom:1rem;"></i>
        <p>No medication reminders set yet.<br>Add one using the form.</p>
      </div>`;
    }
  } catch(e) {
    cont.innerHTML = '<div class="empty-state"><p style="color:#f43f5e;">Failed to load reminders.</p></div>';
  }
}

async function submitReminder(e) {
  e.preventDefault();
  const payload = {
    medicine_name: document.getElementById('medicine_name').value,
    dosage:        document.getElementById('dosage_input').value,
    time_of_day:   document.getElementById('time_of_day').value
  };
  const resp = await fetch('/api/ai/prescription-reminders', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
  });
  const data = await resp.json();
  if (data.success) {
    document.getElementById('medicine_name').value = '';
    document.getElementById('dosage_input').value  = '';
    loadReminders();
  } else { alert(data.error); }
}

async function deleteReminder(id) {
  if (!confirm('Remove this reminder?')) return;
  const resp = await fetch(`/api/ai/prescription-reminders/delete/${id}`, { method: 'POST' });
  const data = await resp.json();
  if (data.success) {
    const el = document.getElementById('rem-' + id);
    if (el) { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; el.style.transition = 'all 0.3s'; setTimeout(() => el.remove(), 300); }
  } else { alert(data.error); }
}
