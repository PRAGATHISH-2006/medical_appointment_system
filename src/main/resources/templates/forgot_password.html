<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{layout :: head('Forgot Password - Medicalcare', ~{})}"></head>

<body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div th:replace="~{layout :: alerts}"></div>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <h2><i class="fas fa-key"></i> Forgot Password</h2>
                <p class="text-muted small mb-4">Enter your registered email address and we'll send you a password reset link.</p>

                <form th:action="@{/forgot-password}" method="POST">
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Send Reset Link
                    </button>
                </form>

                <p class="auth-link">
                    Remember password? <a th:href="@{/login}">Login here</a>
                </p>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
    <script th:replace="~{layout :: scripts}"></script>
</body>

</html>
