<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{layout :: head('Login - Medicalcare', ~{})}"></head>

<body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div th:replace="~{layout :: alerts}"></div>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <h2><i class="fas fa-sign-in-alt"></i> Login to Medicalcare</h2>

                <form th:action="@{/login}" method="POST">
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <p class="auth-link">
                    Don't have an account? <a th:href="@{/register}">Register here</a>
                </p>
                <p class="auth-link">
                    <a th:href="@{/forgot-password}">Forgot Password?</a>
                </p>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
    <script th:replace="~{layout :: scripts}"></script>
</body>

</html>
