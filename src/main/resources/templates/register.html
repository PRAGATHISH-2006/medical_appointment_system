<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{layout :: head('Register - Medicalcare', ~{})}"></head>

<body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div th:replace="~{layout :: alerts}"></div>

    <main>
        <div class="auth-container" style="max-width: 600px; margin-top: 2rem; margin-bottom: 4rem;">
            <div class="auth-card">
                <h2><i class="fas fa-user-plus"></i> Create Account</h2>

                <form th:action="@{/register}" method="POST">
                    <div class="form-group">
                        <label for="name"><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="Enter email" required>
                    </div>

                    <div class="grid-2-1 gap-1">
                        <div class="form-group">
                            <label for="password"><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="Min 6 characters" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm_password"><i class="fas fa-check-double"></i> Confirm Password</label>
                            <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="role"><i class="fas fa-user-tag"></i> Select Role</label>
                        <select id="role" name="role" class="form-control" onchange="toggleDoctorFields()" required>
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                        </select>
                    </div>

                    <!-- Doctor Specific Fields -->
                    <div id="doctor-fields" style="display: none;" class="p-3 bg-light rounded mb-3 border">
                        <h4 class="mb-3 text-primary"><i class="fas fa-stethoscope"></i> Professional Details</h4>
                        
                        <div class="form-group">
                            <label for="specialization">Specialization</label>
                            <input type="text" id="specialization" name="specialization" class="form-control" placeholder="e.g. Cardiologist, Dermatologist">
                        </div>

                        <div class="form-group">
                            <label for="qualification">Qualifications</label>
                            <input type="text" id="qualification" name="qualification" class="form-control" placeholder="e.g. MBBS, MD">
                        </div>

                        <div class="grid-2-1 gap-1">
                            <div class="form-group">
                                <label for="experience">Experience (Years)</label>
                                <input type="number" id="experience" name="experience" class="form-control" placeholder="e.g. 5">
                            </div>
                            <div class="form-group">
                                <label for="consultation_fee">Consultation Fee (₹)</label>
                                <input type="number" id="consultation_fee" name="consultation_fee" class="form-control" placeholder="e.g. 500" value="0.0">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone"><i class="fas fa-phone"></i> Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-control" placeholder="10 digit mobile" required>
                    </div>

                    <div class="form-group">
                        <label for="address"><i class="fas fa-map-marker-alt"></i> Residential Address</label>
                        <textarea id="address" name="address" class="form-control" rows="3" placeholder="Enter complete address" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-2">
                        <i class="fas fa-user-plus"></i> Register
                    </button>
                </form>

                <p class="auth-link">
                    Already have an account? <a th:href="@{/login}">Login here</a>
                </p>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
    <script th:replace="~{layout :: scripts}"></script>
    <script>
        // Make sure fields are shown if page reloads with doctor selected
        document.addEventListener('DOMContentLoaded', toggleDoctorFields);
    </script>
</body>

</html>
