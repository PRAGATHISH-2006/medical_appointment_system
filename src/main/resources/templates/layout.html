<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:fragment="head(title, extra_css)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}"></title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    
    <!-- Extra CSS block -->
    <th:block th:replace="${extra_css}"></th:block>
</head>

<body>
    <nav th:fragment="navbar" class="navbar">
        <div class="container">
            <!-- Animated Logo -->
            <a th:href="${session.role == 'admin'} ? @{/admin/dashboard} : (${session.role == 'doctor'} ? @{/doctor/dashboard} : (${session.role == 'hospital'} ? @{/hospital/dashboard} : (${session.role == 'patient'} ? @{/patient/dashboard} : @{/})))" class="logo">
                <i class="fas fa-heartbeat nav-heartbeat"></i> Medicalcare
            </a>

            <div class="nav-links">
                <!-- ── LOGGED IN ── -->
                <th:block th:if="${session.user_id != null}">

                    <!-- Patient Nav Links -->
                    <th:block th:if="${session.role == 'patient'}">
                        <a th:href="@{/patient/dashboard}" th:classappend="${requestURI == '/patient/dashboard' ? 'active' : ''}">
                            <i class="fas fa-tachometer-alt"></i> Dashboard
                        </a>
                        <a th:href="@{/patient/medical-reports}" th:classappend="${requestURI == '/patient/medical-reports' ? 'active' : ''}">
                            <i class="fas fa-file-medical"></i> Records
                        </a>
                        <a th:href="@{/patient/prescriptions}" th:classappend="${requestURI == '/patient/prescriptions' ? 'active' : ''}">
                            <i class="fas fa-file-prescription"></i> Prescriptions
                        </a>
                        <a th:href="@{/patient/appointment}" th:classappend="${requestURI == '/patient/appointment' ? 'active' : ''}">
                            <i class="fas fa-calendar-plus"></i> Book
                        </a>
                        <a th:href="@{/patient/ai-assistant}" th:classappend="${requestURI == '/patient/ai-assistant' ? 'active' : ''}" class="nav-ai-link">
                            <i class="fas fa-robot"></i> AI Hub
                        </a>
                        <a th:href="@{/patient/current-doctor}" th:classappend="${requestURI == '/patient/current-doctor' ? 'active' : ''}">
                            <i class="fas fa-user-md"></i> Doctors
                        </a>
                        <a th:href="@{/patient/notifications}" class="nav-bell" title="Notifications">
                            <i class="fas fa-bell"></i>
                            <span class="nav-badge" th:if="${unread_count > 0}" th:text="${unread_count}"></span>
                        </a>
                    </th:block>

                    <!-- Doctor Nav Links -->
                    <th:block th:if="${session.role == 'doctor'}">
                        <a th:href="@{/doctor/dashboard}" th:classappend="${requestURI == '/doctor/dashboard' ? 'active' : ''}">
                            <i class="fas fa-tachometer-alt"></i> Dashboard
                        </a>
                    </th:block>

                    <!-- Admin Nav Links -->
                    <th:block th:if="${session.role == 'admin'}">
                        <a th:href="@{/admin/dashboard}" th:classappend="${requestURI == '/admin/dashboard' ? 'active' : ''}">
                            <i class="fas fa-tachometer-alt"></i> Dashboard
                        </a>
                        <a th:href="@{/admin/audit-logs}" th:classappend="${requestURI == '/admin/audit-logs' ? 'active' : ''}">
                            <i class="fas fa-history"></i> Audit Trail
                        </a>
                    </th:block>

                    <!-- Hospital Nav Links -->
                    <th:block th:if="${session.role == 'hospital'}">
                        <a th:href="@{/hospital/dashboard}" th:classappend="${requestURI == '/hospital/dashboard' ? 'active' : ''}">
                            <i class="fas fa-tachometer-alt"></i> Dashboard
                        </a>
                        <a th:href="@{/hospital/announcements}" th:classappend="${requestURI == '/hospital/announcements' ? 'active' : ''}">
                            <i class="fas fa-bullhorn"></i> Announcements
                        </a>
                    </th:block>

                    <!-- User Chip -->
                    <div class="nav-user-chip">
                        <div class="nav-avatar"
                             th:text="${#strings.substring(session.name, 0, 1)}"
                             th:classappend="${session.role == 'admin'} ? 'nav-avatar-admin' : (${session.role == 'doctor'} ? 'nav-avatar-doctor' : (${session.role == 'hospital'} ? 'nav-avatar-doctor' : 'nav-avatar-patient'))">U</div>
                        <div class="nav-user-info">
                            <span class="nav-user-name" th:text="${session.name}">User</span>
                            <span class="nav-user-role"
                                  th:classappend="${session.role == 'admin'} ? 'role-admin' : (${session.role == 'doctor'} ? 'role-doctor' : 'role-patient')"
                                  th:text="${#strings.capitalize(session.role)}">Role</span>
                        </div>
                        <a th:href="@{/logout}" class="nav-logout" title="Logout">
                            <i class="fas fa-sign-out-alt"></i>
                        </a>
                    </div>
                </th:block>

                <!-- ── GUEST ── -->
                <th:block th:if="${session.user_id == null}">
                    <a th:href="@{/}" th:classappend="${requestURI == '/' ? 'active' : ''}">Home</a>
                    <a th:href="@{/login}" th:classappend="${requestURI == '/login' ? 'active' : ''}">Login</a>
                    <a th:href="@{/register}" th:classappend="${requestURI == '/register' ? 'active' : ''}">Register</a>
                </th:block>
            </div>
        </div>
    </nav>

    <!-- Global Flash Alerts -->
    <div th:fragment="alerts" class="container" style="margin-top: 1rem;">
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-warning" th:if="${warning}" th:text="${warning}"></div>
        <div class="alert alert-info" th:if="${info}" th:text="${info}"></div>
    </div>

    <footer th:fragment="footer" class="footer">
        <div class="container">
            <p>&copy; <span class="current-year">2026</span> Medical Appointment System. All rights reserved.</p>
        </div>
    </footer>

    <!-- Global Scripts -->
    <script th:fragment="scripts" th:src="@{/js/script.js}"></script>
</body>

</html>
