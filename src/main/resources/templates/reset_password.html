<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{layout :: head('Reset Password - Medicalcare', ~{})}"></head>

<body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div th:replace="~{layout :: alerts}"></div>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <h2><i class="fas fa-lock-open"></i> Reset Password</h2>
                <p class="text-muted small mb-4">Please type your new strong password.</p>

                <form th:action="@{/reset-password/{token}(token=${token})}" method="POST">
                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock"></i> New Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Min 6 characters" required>
                    </div>

                    <div class="form-group">
                        <label for="confirm_password"><i class="fas fa-check-double"></i> Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Repeat new password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Update Password
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
    <script th:replace="~{layout :: scripts}"></script>
</body>

</html>
